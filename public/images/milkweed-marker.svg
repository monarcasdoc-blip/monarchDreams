<svg width="40" height="58" viewBox="0 0 40 58" xmlns="http://www.w3.org/2000/svg">
  <!-- pod body, tapering to a point that marks the exact spot -->
  <path d="M20 12
           C28 12 33 20 32 30
           C31 40 26 50 20 58
           C14 50 9 40 8 30
           C7 20 12 12 20 12 Z"
        fill="#4a7c3f"/>

  <!-- bumpy pod texture -->
  <circle cx="15" cy="22" r="1.6" fill="#375c2e"/>
  <circle cx="24" cy="20" r="1.4" fill="#375c2e"/>
  <circle cx="26" cy="28" r="1.7" fill="#375c2e"/>
  <circle cx="13" cy="30" r="1.5" fill="#375c2e"/>
  <circle cx="20" cy="36" r="1.6" fill="#375c2e"/>
  <circle cx="17" cy="42" r="1.3" fill="#375c2e"/>
  <circle cx="23" cy="40" r="1.4" fill="#375c2e"/>

  <!-- pod splitting open at top, releasing silk — each wisp gets a thin
       dark outline first so it still reads against pale map tiles -->
  <g fill="none" stroke="#1a1a1a" stroke-width="2.1" stroke-linecap="round">
    <path d="M20 12 C18 9 19 7 20 6"/>
    <path d="M20 12 C20 8 21 6.5 23 5"/>
    <path d="M20 12 C22 9 24 8 26 7"/>
  </g>
  <g fill="none" stroke="#fdfaf5" stroke-width="1.1" stroke-linecap="round">
    <path d="M20 12 C18 9 19 7 20 6"/>
    <path d="M20 12 C20 8 21 6.5 23 5"/>
    <path d="M20 12 C22 9 24 8 26 7"/>
  </g>
</svg>
